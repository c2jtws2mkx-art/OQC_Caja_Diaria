<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojú qué calor - Caja Diaria</title>
    <!-- Google Fonts: Roboto for clean, modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <header class="app-header">
        <h1>Ojú qué calor! - Caja Chica</h1>
    </header>

    <main class="container">
        <!-- Resumen del Mes (Tarjetas Superiores) -->
        <section class="summary-card"
            style="margin-bottom: 2rem; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 1rem;">
            <div
                style="text-align: center; background: var(--bg-surface); padding: 1.5rem; border-radius: var(--border-radius-lg); box-shadow: var(--shadow-sm); flex: 1; min-width: 120px;">
                <h3 style="margin: 0; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase;">Saldo
                    Actual</h3>
                <div class="summary-amount" id="summaryTotal" style="margin-top: 0.5rem;">0,00 €</div>
            </div>
            <div
                style="text-align: center; background: var(--bg-surface); padding: 1.5rem; border-radius: var(--border-radius-lg); box-shadow: var(--shadow-sm); flex: 1; min-width: 120px;">
                <h3 style="margin: 0; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase;">Ingresos
                </h3>
                <div class="summary-amount positive" id="summaryIngresos" style="margin-top: 0.5rem;">0,00 €</div>
            </div>
            <div
                style="text-align: center; background: var(--bg-surface); padding: 1.5rem; border-radius: var(--border-radius-lg); box-shadow: var(--shadow-sm); flex: 1; min-width: 120px;">
                <h3 style="margin: 0; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase;">Gastos
                </h3>
                <div class="summary-amount negative" id="summaryGastos" style="margin-top: 0.5rem;">0,00 €</div>
            </div>
        </section>

        <!-- Formulario Nuevo Asiento -->
        <section class="form-card">
            <h2 class="section-title">Nuevo Asiento</h2>

            <button type="button" class="btn-scan" id="btnScan">
                <i class="fa-solid fa-camera"></i> Escanear o Subir Factura
            </button>
            <input type="file" id="receiptFileInput" accept="image/*" capture="environment" style="display: none;">

            <form id="entryForm">
                <div class="type-toggle">
                    <button type="button" class="toggle-btn active-gasto" id="btnTypeGasto"
                        data-type="gasto">Gasto</button>
                    <button type="button" class="toggle-btn" id="btnTypeIngreso" data-type="ingreso">Ingreso</button>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fechaFactura">Fecha Factura</label>
                        <input type="date" id="fechaFactura" required>
                    </div>
                    <div class="form-group">
                        <label for="proveedor">Proveedor <button type="button" id="btnOpenContacts" class="icon-btn"
                                title="Buscar Contacto"><i class="fa-solid fa-address-book"></i></button></label>
                        <input type="text" id="proveedor" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cifNif">CIF/NIF</label>
                        <input type="text" id="cifNif">
                    </div>
                    <div class="form-group full-width">
                        <label for="categoria">Categoría</label>
                        <select id="categoria" required>
                            <option value="Otros">Otros</option>
                            <option value="Comidas">Comidas</option>
                            <option value="Desplazamientos">Desplazamientos</option>
                            <option value="Suministros">Suministros</option>
                            <option value="Tecnología">Tecnología</option>
                            <option value="Nave">Nave</option>
                            <option value="Fontanería">Fontanería</option>
                            <option value="Climatización">Climatización</option>
                            <option value="Albañilería">Albañilería</option>
                            <option value="Chapuzas">Chapuzas</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="detalle">Detalle / Concepto</label>
                        <input type="text" id="detalle">
                    </div>
                </div>

                <div class="prices-grid">
                    <div class="form-group">
                        <label for="baseImponible">Base Imp.</label>
                        <input type="number" step="0.01" id="baseImponible" value="0">
                    </div>
                    <div class="form-group">
                        <label for="porcentajeIva">% IVA</label>
                        <select id="porcentajeIva">
                            <option value="0">0</option>
                            <option value="4">4</option>
                            <option value="10">10</option>
                            <option value="21" selected>21</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="montoIva">Monto IVA</label>
                        <input type="number" step="0.01" id="montoIva" value="0">
                    </div>
                    <div class="form-group">
                        <label for="otrosCargos">Otros Cargos</label>
                        <input type="number" step="0.01" id="otrosCargos" value="0">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="total">Total</label>
                        <input type="number" step="0.01" id="total" value="0"
                            style="font-weight: bold; font-size: 1.1em;">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-limpiar" id="btnLimpiar">Limpiar</button>
                    <button type="submit" class="btn-guardar" id="btnGuardar">Guardar</button>
                </div>
            </form>
        </section>

        <!-- Listado Principal con Filtros -->
        <section class="list-card">
            <div class="list-header" style="flex-direction: column; align-items: stretch; gap: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h2 class="section-title" style="margin: 0;">Asientos Bancarios</h2>
                    <div class="list-actions">
                        <button type="button" class="btn-secondary" id="btnExportCSV"><i
                                class="fa-solid fa-file-export"></i> Exportar</button>
                    </div>
                </div>

                <!-- Filtros del Listado -->
                <div class="form-row"
                    style="background: var(--bg-light); padding: 1rem; border-radius: var(--border-radius-md); margin-bottom: 0;">
                    <div class="form-group flex-1">
                        <label for="filterMes">Periodo</label>
                        <select id="filterMes">
                            <option value="ALL">Todo el Año</option>
                            <optgroup label="Trimestres">
                                <option value="T1">T1 (Ene-Mar)</option>
                                <option value="T2">T2 (Abr-Jun)</option>
                                <option value="T3">T3 (Jul-Sep)</option>
                                <option value="T4">T4 (Oct-Dic)</option>
                            </optgroup>
                            <optgroup label="Meses">
                                <option value="01">Enero</option>
                                <option value="02">Febrero</option>
                                <option value="03">Marzo</option>
                                <option value="04">Abril</option>
                                <option value="05">Mayo</option>
                                <option value="06">Junio</option>
                                <option value="07">Julio</option>
                                <option value="08">Agosto</option>
                                <option value="09">Septiembre</option>
                                <option value="10">Octubre</option>
                                <option value="11">Noviembre</option>
                                <option value="12">Diciembre</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label for="filterAnio">Año</label>
                        <select id="filterAnio">
                            <!-- JS fill dynamically -->
                            <option value="2026">2026</option>
                            <option value="ALL">Histórico Completo</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label for="filterCategoriaList">Categoría</label>
                        <select id="filterCategoriaList">
                            <option value="ALL">Todas</option>
                            <option value="Comidas">Comidas</option>
                            <option value="Desplazamientos">Desplazamientos</option>
                            <option value="Suministros">Suministros</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>FECHA</th>
                            <th>PROVEEDOR</th>
                            <th class="text-right">TOTAL</th>
                            <th class="text-center">ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="listaMesBody">
                        <!-- Las filas se llenarán por JS -->
                        <tr>
                            <td colspan="4" class="text-center" style="padding: 2rem;">Cargando registros...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <!-- Vista anual eliminada -->

    <!-- Modal de Contactos -->
    <div id="contactsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeContactsModal">&times;</span>
            <h2>Gestión de Contactos</h2>
            <div class="modal-body">
                <div class="search-container">
                    <input type="text" id="searchContact" placeholder="Buscar contacto por nombre o CIF...">
                </div>
                <div class="contacts-list-container" id="contactsList">
                    <!-- Registros de contactos -->
                </div>
                <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid var(--border-color);">
                <h3>Nuevo Contacto</h3>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="newContactName">Nombre/Razón Social</label>
                        <input type="text" id="newContactName" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="newContactCif">CIF/NIF</label>
                            <input type="text" id="newContactCif">
                        </div>
                        <div class="form-group">
                            <label for="newContactTel">Teléfono</label>
                            <input type="tel" id="newContactTel">
                        </div>
                    </div>
                    <div class="form-group text-right" style="margin-top: 1rem;">
                        <button type="submit" class="btn-guardar">Guardar Contacto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/contactos.js"></script>
</body>

</html>
